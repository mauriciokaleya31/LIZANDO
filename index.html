<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for sandboxed iframes where window.fetch is a read-only getter
      (function() {
        try {
          const originalFetch = window.fetch;
          let customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to define writable global fetch:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'pt',
          includedLanguages: 'pt,en,fr,es,zh-CN',
          layout: 3, // InlineLayout.SIMPLE is 3
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
